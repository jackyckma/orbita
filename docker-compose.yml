services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: orbita
      POSTGRES_PASSWORD: orbita
      POSTGRES_DB: orbita
    ports:
      - "5432:5432"
    volumes:
      - orbita_pg:/var/lib/postgresql/data
      - ./packages/lane-auth/drizzle/0000_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbita -d orbita"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://orbita:orbita@postgres:5432/orbita
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  orbita_pg:
