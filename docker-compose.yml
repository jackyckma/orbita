services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: orbita
      POSTGRES_PASSWORD: orbita
      POSTGRES_DB: orbita
    ports:
      - "5432:5432"
    volumes:
      - orbita_pg:/var/lib/postgresql/data
      - ./packages/lane-auth/drizzle/0000_init.sql:/docker-entrypoint-initdb.d/001_auth.sql:ro
      - ./packages/lane-sessions/drizzle/0001_sessions.sql:/docker-entrypoint-initdb.d/002_sessions.sql:ro
      - ./packages/lane-sessions/drizzle/0002_compression.sql:/docker-entrypoint-initdb.d/002b_sessions_compression.sql:ro
      - ./packages/lane-memory/drizzle/0002_vectors.sql:/docker-entrypoint-initdb.d/003b_memory_vectors.sql:ro
      - ./packages/lane-scheduler/drizzle/0002_cron.sql:/docker-entrypoint-initdb.d/005b_scheduler_cron.sql:ro
      - ./packages/lane-memory/drizzle/0001_memory.sql:/docker-entrypoint-initdb.d/003_memory.sql:ro
      - ./packages/lane-trajectory/drizzle/0001_trajectory.sql:/docker-entrypoint-initdb.d/004_trajectory.sql:ro
      - ./packages/lane-scheduler/drizzle/0001_scheduler.sql:/docker-entrypoint-initdb.d/005_scheduler.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbita -d orbita"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://orbita:orbita@postgres:5432/orbita
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  orbita_pg:
